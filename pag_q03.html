<body>

    <h1>
        Informe a distância, o consumo médio 
        do veículo e o preço do combustível para calcular o gasto da viagem.
    </h1>
    
    <div id="div-form">

        <h3>QUANTIDADE DO COMBUSTÍVEL</h3>

        <form id="formDADOS">

        <label>Distância (km)</label>
        <input type="text" name="distancia" id="distancia">

        <label>Consumo médio (km/l)</label>
        <input type="text" name="consumo" id="consumo">

        <label>Preço do litro (R$)</label>
        <input type="text" name="preco" id="preco">
    
    
            <button type="submit">Enviar</button>
            <button type="reset">Limpar</button>

        </form>

        <div id="divResultado"></div>


        </div>

    

</body>
